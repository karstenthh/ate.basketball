<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Tournament App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  overflow: hidden;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #222;
}

/* MAIN SCOREBOARD */
.scoreboard {
  flex: 1;
  display: flex;
}

.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 10px;
}

.team-name {
  text-align: center;
  font-size: 3vw;
}

.score {
  text-align: center;
  font-size: 20vw;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  font-size: 4vw;
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
}

.add { background: #2ecc71; }
.sub { background: #e74c3c; }
.undo { background: #f1c40f; }

.bottom-bar {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #222;
}

/* LEADERBOARD */
#leaderboard {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  flex-direction: column;
}

table {
  width: 100%;
  text-align: center;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid #444;
}

.gold {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<div id="app">

  <div class="topbar">
    <div id="matchInfo">Match 1</div>
    <button onclick="showLeaderboard()">Leaderboard</button>
  </div>

  <div class="scoreboard">
    
    <div class="team">
      <div class="team-name" id="team1Name">Team A</div>
      <div class="score" id="team1Score">0</div>
      <div class="controls">
        <button class="add" onclick="addScore(1,1)">+1</button>
        <button class="add" onclick="addScore(1,2)">+2</button>
        <button class="add" onclick="addScore(1,3)">+3</button>
        <button class="sub" onclick="minusScore(1)">-1</button>
        <button class="undo" onclick="undoScore(1)">UNDO</button>
      </div>
    </div>

    <div class="team">
      <div class="team-name" id="team2Name">Team B</div>
      <div class="score" id="team2Score">0</div>
      <div class="controls">
        <button class="add" onclick="addScore(2,1)">+1</button>
        <button class="add" onclick="addScore(2,2)">+2</button>
        <button class="add" onclick="addScore(2,3)">+3</button>
        <button class="sub" onclick="minusScore(2)">-1</button>
        <button class="undo" onclick="undoScore(2)">UNDO</button>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <button onclick="startMatch()">Start</button>
    <button onclick="endMatch()">End Match</button>
    <button onclick="nextMatch()">Next Match</button>
  </div>

</div>

<!-- LEADERBOARD -->
<div id="leaderboard">
  <h2 style="text-align:center;">Leaderboard</h2>
  <table id="leaderboardTable"></table>
  <button onclick="hideLeaderboard()">Close</button>
</div>

<script>
let teams = [
  { name: "Team A", wins: 0, points: 0 },
  { name: "Team B", wins: 0, points: 0 },
  { name: "Team C", wins: 0, points: 0 },
  { name: "Team D", wins: 0, points: 0 }
];

let matches = [
  [0,1],
  [2,3],
  [0,2],
  [1,3],
  [0,3],
  [1,2]
];

let currentMatch = 0;

let scores = { team1: 0, team2: 0 };
let history = { team1: [], team2: [] };
let matchState = "not_started";

/* SCORE FUNCTIONS */
function addScore(team, val) {
  if (matchState !== "ongoing") return;

  navigator.vibrate(30);

  if (team === 1) {
    scores.team1 += val;
    history.team1.push(val);
  } else {
    scores.team2 += val;
    history.team2.push(val);
  }
  updateUI();
}

function minusScore(team) {
  if (matchState !== "ongoing") return;

  if (team === 1 && scores.team1 > 0) {
    scores.team1 -= 1;
  } else if (team === 2 && scores.team2 > 0) {
    scores.team2 -= 1;
  }
  updateUI();
}

function undoScore(team) {
  if (matchState !== "ongoing") return;

  let last;
  if (team === 1) {
    last = history.team1.pop();
    if (last) scores.team1 -= last;
  } else {
    last = history.team2.pop();
    if (last) scores.team2 -= last;
  }
  updateUI();
}

/* MATCH CONTROL */
function startMatch() {
  matchState = "ongoing";
}

function endMatch() {
  matchState = "finished";

  let [t1, t2] = matches[currentMatch];

  teams[t1].points += scores.team1;
  teams[t2].points += scores.team2;

  if (scores.team1 > scores.team2) teams[t1].wins++;
  else if (scores.team2 > scores.team1) teams[t2].wins++;

  saveData();
}

function nextMatch() {
  currentMatch++;
  if (currentMatch >= matches.length) {
    alert("Tournament Finished!");
    return;
  }

  resetScore();
  loadMatch();
}

function resetScore() {
  scores = { team1: 0, team2: 0 };
  history = { team1: [], team2: [] };
  matchState = "not_started";
  updateUI();
}

function loadMatch() {
  let [t1, t2] = matches[currentMatch];

  document.getElementById("team1Name").innerText = teams[t1].name;
  document.getElementById("team2Name").innerText = teams[t2].name;
  document.getElementById("matchInfo").innerText = "Match " + (currentMatch+1);
}

/* UI */
function updateUI() {
  document.getElementById("team1Score").innerText = scores.team1;
  document.getElementById("team2Score").innerText = scores.team2;
}

/* LEADERBOARD */
function showLeaderboard() {
  let sorted = [...teams].sort((a,b)=>{
    if (b.wins !== a.wins) return b.wins - a.wins;
    return b.points - a.points;
  });

  let html = "<tr><th>Team</th><th>Wins</th><th>Points</th></tr>";

  sorted.forEach((t,i)=>{
    html += `<tr class="${i===0 ? 'gold':''}">
      <td>${t.name}</td>
      <td>${t.wins}</td>
      <td>${t.points}</td>
    </tr>`;
  });

  document.getElementById("leaderboardTable").innerHTML = html;
  document.getElementById("leaderboard").style.display = "flex";
}

function hideLeaderboard() {
  document.getElementById("leaderboard").style.display = "none";
}

/* STORAGE */
function saveData() {
  localStorage.setItem("teams", JSON.stringify(teams));
}

function loadData() {
  let data = localStorage.getItem("teams");
  if (data) teams = JSON.parse(data);
}

/* INIT */
loadData();
loadMatch();
updateUI();

</script>

</body>
</html>
