<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Scoreboard</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
    padding: 15px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.match-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 20px;
    border-radius: 15px;
}

.scoreboard {
    text-align: center;
}

.score {
    font-size: 3em;
    font-weight: bold;
}

.timer {
    font-size: 2em;
    color: gold;
}

.controls {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.team-controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    padding: 14px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(45deg,#ff6b6b,#ffd93d);
    color: white;
}

.undo {
    background: #888;
}

/* MOBILE */
@media (max-width:768px){
    .controls {
        flex-direction: column;
    }

    button {
        width: 100%;
        font-size: 1.3em;
    }

    .match-container {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="match-container">
    <div class="scoreboard">
        <div>Team 1</div>
        <div id="team1Score" class="score">0</div>
    </div>

    <div id="timer" class="timer">12:00</div>

    <div class="scoreboard">
        <div>Team 2</div>
        <div id="team2Score" class="score">0</div>
    </div>
</div>

<div class="controls">

    <!-- TEAM 1 -->
    <div class="team-controls">
        <h3>Team 1</h3>
        <button onclick="addPoint(1,1)">+1</button>
        <button onclick="addPoint(1,2)">+2</button>
        <button onclick="addPoint(1,3)">+3</button>
        <button class="undo" onclick="undo(1)">UNDO</button>
    </div>

    <!-- TEAM 2 -->
    <div class="team-controls">
        <h3>Team 2</h3>
        <button onclick="addPoint(2,1)">+1</button>
        <button onclick="addPoint(2,2)">+2</button>
        <button onclick="addPoint(2,3)">+3</button>
        <button class="undo" onclick="undo(2)">UNDO</button>
    </div>

</div>

</div>

<script>
let scores = { team1: 0, team2: 0 };

// store last actions separately per team
let history = {
    team1: [],
    team2: []
};

function addPoint(team, pts) {
    if (team === 1) {
        scores.team1 += pts;
        history.team1.push(pts);
        document.getElementById('team1Score').textContent = scores.team1;
    } else {
        scores.team2 += pts;
        history.team2.push(pts);
        document.getElementById('team2Score').textContent = scores.team2;
    }
}

function undo(team) {
    if (team === 1 && history.team1.length > 0) {
        const last = history.team1.pop();
        scores.team1 -= last;
        document.getElementById('team1Score').textContent = scores.team1;
    }

    if (team === 2 && history.team2.length > 0) {
        const last = history.team2.pop();
        scores.team2 -= last;
        document.getElementById('team2Score').textContent = scores.team2;
    }
}
</script>

</body>
</html>
