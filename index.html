<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Tournament - Volume Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: black;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .team-card {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .team-card:hover, .team-card.selected {
            background: rgba(255,255,255,0.25);
            border-color: #ffd700;
            transform: translateY(-5px);
        }

        .team-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }
        .undo-btn {
    background: #888;
}


        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .match-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .scoreboard {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            min-width: 120px;
        }

        .timer {
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #ffd700;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 1.1em;
            border-radius: 10px;
            border: none;
            width: 100px;
            text-align: center;
        }

        .standings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .standing-team {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-match-info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .hidden {
            display: none !important;
        }

        .winner-badge {
            background: #ffd700;
            color: #1e3c72;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        @media (max-width: 768px) {
    .controls {
        flex-direction: column;
    }

    button {
        width: 100%;
        font-size: 1.2em;
        padding: 16px;
    }

    .match-container {
        flex-direction: column;
        gap: 15px;
    }

    .scoreboard {
        font-size: 2.2em;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 Basketball Volume Tournament</h1>
        
        <!-- Team Setup -->
        <div id="teamSetup" class="section">
            <h2>📋 Volume Setup</h2>
            <div class="teams-grid" id="teamInputs">
                <!-- Team inputs will be generated here -->
            </div>
            <div style="text-align: center;">
                <button onclick="generateSchedule()">Generate Schedule</button>
            </div>
        </div>

        <!-- Schedule -->
        <div id="scheduleSection" class="section hidden">
            <h2>📅 Match Schedule</h2>
            <div id="scheduleList"></div>
            <button onclick="startNextMatch()" id="startMatchBtn" class="hidden">Start Next Match</button>
        </div>

        <!-- Current Match -->
        <div id="matchSection" class="section hidden">
            <h2>⚡ Live Match</h2>
            <div id="currentMatchInfo" class="current-match-info"></div>
            
            <div class="match-container">
                <div class="scoreboard">
                    <div id="team1Name" class="team-name"></div>
                    <div id="team1Score" style="font-size: 0.6em;">0</div>
                </div>
                <div class="timer" id="timer">12:00</div>
                <div class="scoreboard">
                    <div id="team2Name" class="team-name"></div>
                    <div id="team2Score" style="font-size: 0.6em;">0</div>
                </div>
            </div>

            <div class="controls">
                <input type="number" id="matchTime" placeholder="Minutes" min="1" max="30" value="12">
                <button onclick="setTimer()">Set Timer</button>
                <button onclick="addPoint(1)">+1 Team 1</button>
                <button onclick="addPoint(2)">+1 Team 2</button>
                <button onclick="addPoint(1, 2)">+2 Team 1</button>
                <button onclick="addPoint(2, 2)">+2 Team 2</button>
                <button onclick="addPoint(1, 3)">+3 Team 1</button>
                <button onclick="addPoint(2, 3)">+3 Team 2</button>
                  <button class="undo-btn" onclick="undoScore(1)">Undo T1</button>
    <button class="undo-btn" onclick="undoScore(2)">Undo T2</button>
    <button class="pause-btn" onclick="togglePause()">Pause / Resume</button>
                <button onclick="endMatch()">End Match</button>
            </div>
        </div>

        <!-- Standings -->
        <div id="standingsSection" class="section hidden">
            <h2>🏆 Tournament Standings</h2>
            <div class="standings" id="standingsList"></div>
            <button onclick="resetTournament()">New Volume</button>
        </div>
    </div>

    <script>
        let teams = [];
        let schedule = [];
        let currentMatchIndex = -1;
        let currentMatch = null;
        let timerInterval = null;
        let timeLeft = 12 * 60; // 12 minutes in seconds
        let scores = { team1: 0, team2: 0 };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createTeamInputs();
        });

        function createTeamInputs() {
            const teamInputs = document.getElementById('teamInputs');
            teamInputs.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const teamDiv = document.createElement('div');
                teamDiv.className = 'team-card';
                teamDiv.innerHTML = `
                    <div class="team-name">Team ${i + 1}</div>
                    <input type="text" placeholder="Enter team name" data-team="${i}">
                `;
                teamInputs.appendChild(teamDiv);
            }
        }

        function generateSchedule() {
            teams = [];
            const inputs = document.querySelectorAll('[data-team]');
            let validTeams = 0;

            inputs.forEach((input, index) => {
                const name = input.value.trim();
                if (name) {
                    teams.push({ name, wins: 0, points: 0, losses: 0 });
                    validTeams++;
                }
            });

            if (validTeams !== 5) {
                alert('Please enter exactly 5 team names!');
                return;
            }

            // Generate round-robin schedule (10 matches)
            schedule = [];
            for (let i = 0; i < 5; i++) {
                for (let j = i + 1; j < 5; j++) {
                    schedule.push({
                        matchId: schedule.length,
                        team1: teams[i],
                        team2: teams[j],
                        team1Score: 0,
                        team2Score: 0,
                        completed: false
                    });
                }
            }

            document.getElementById('teamSetup').classList.add('hidden');
            displaySchedule();
        }

        function displaySchedule() {
            const scheduleList = document.getElementById('scheduleList');
            scheduleList.innerHTML = '';
            
            schedule.forEach((match, index) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match-container';
                matchDiv.innerHTML = `
                    <div>${match.team1.name} vs ${match.team2.name}</div>
                    <div>${match.team1Score} - ${match.team2Score}</div>
                    <div>${match.completed ? '✅ Completed' : '⏳ Pending'}</div>
                `;
                scheduleList.appendChild(matchDiv);
            });

            document.getElementById('scheduleSection').classList.remove('hidden');
            document.getElementById('startMatchBtn').classList.remove('hidden');
        }

        function startNextMatch() {
            currentMatchIndex++;
            if (currentMatchIndex >= schedule.length) {
                finalizeTournament();
                return;
            }

            currentMatch = schedule[currentMatchIndex];
            startMatch();
        }

        function startMatch() {
            scores = { team1: currentMatch.team1Score, team2: currentMatch.team2Score };
            timeLeft = 12 * 60;
            updateTimerDisplay();

            document.getElementById('team1Name').textContent = currentMatch.team1.name;
            document.getElementById('team2Name').textContent = currentMatch.team2.name;
            document.getElementById('team1Score').textContent = scores.team1;
            document.getElementById('team2Score').textContent = scores.team2;

            document.getElementById('currentMatchInfo').innerHTML = `
                Match ${currentMatchIndex + 1}/10: ${currentMatch.team1.name} vs ${currentMatch.team2.name}
            `;

            document.getElementById('scheduleSection').classList.add('hidden');
            document.getElementById('matchSection').classList.remove('hidden');
            
            // Start timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function setTimer() {
            const minutes = parseInt(document.getElementById('matchTime').value);
            if (minutes > 0) {
                timeLeft = minutes * 60;
                updateTimerDisplay();
            }
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                return;
            }
            timeLeft--;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function addPoint(teamNum, points = 1) {
            if (teamNum === 1) {
                scores.team1 += points;
                document.getElementById('team1Score').textContent = scores.team1;
            } else {
                scores.team2 += points;
                document.getElementById('team2Score').textContent = scores.team2;
            }
        }
        let scoreHistory = { team1: [], team2: [] };
let isPaused = false;
function undoScore(teamNum) {
    if (teamNum === 1 && scoreHistory.team1.length > 0) {
        const last = scoreHistory.team1.pop();
        scores.team1 -= last;
        document.getElementById('team1Score').textContent = scores.team1;
    }

    if (teamNum === 2 && scoreHistory.team2.length > 0) {
        const last = scoreHistory.team2.pop();
        scores.team2 -= last;
        document.getElementById('team2Score').textContent = scores.team2;
    }
}
        function togglePause() {
    if (isPaused) {
        timerInterval = setInterval(updateTimer, 1000);
        isPaused = false;
    } else {
        clearInterval(timerInterval);
        isPaused = true;
    }
}
        function endMatch() {
            clearInterval(timerInterval);
            
            currentMatch.team1Score = scores.team1;
            currentMatch.team2Score = scores.team2;
            currentMatch.completed = true;

            // Update team records
            if (scores.team1 > scores.team2) {
                currentMatch.team1.wins++;
                currentMatch.team1.points += 3;
                currentMatch.team2.losses++;
            } else if (scores.team2 > scores.team1) {
                currentMatch.team2.wins++;
                currentMatch.team2.points += 3;
                currentMatch.team1.losses++;
            } else {
                // Draw - 1 point each
                currentMatch.team1.points += 1;
                currentMatch.team2.points += 1;
            }

            document.getElementById('matchSection').classList.add('hidden');
            displaySchedule();
            document.getElementById('scheduleSection').classList.remove('hidden');
            document.getElementById('standingsSection').classList.remove('hidden');
            updateStandings();

            if (currentMatchIndex < schedule.length - 1) {
                setTimeout(() => {
                    if (confirm('Start next match?')) {
                        startNextMatch();
                    }
                }, 1000);
            }
        }

        function updateStandings() {
            const sortedTeams = [...teams].sort((a, b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                return b.points - a.points;
            });

            const standingsList = document.getElementById('standingsList');
            standingsList.innerHTML = '';

            sortedTeams.forEach((team, index) => {
                const teamDiv = document.createElement('div');
                teamDiv.className = 'standing-team';
                const position = index === 0 ? '🥇 CHAMPION' : index + 1;
                teamDiv.innerHTML = `
                    <div>
                        <strong>${position}</strong> ${team.name}<br>
                        <small>W: ${team.wins} L: ${team.losses} Pts: ${team.points}</small>
                    </div>
                    ${index === 0 ? '<span class="winner-badge">🏆 WINNER</span>' : ''}
                `;
                standingsList.appendChild(teamDiv);
            });
        }

        function finalizeTournament() {
            updateStandings();
            alert('Tournament Complete! 🏆');
        }

        function resetTournament() {
            teams = [];
            schedule = [];
            currentMatchIndex = -1;
            document.getElementById('teamSetup').classList.remove('hidden');
            document.getElementById('scheduleSection').classList.add('hidden');
            document.getElementById('matchSection').classList.add('hidden');
            document.getElementById('standingsSection').classList.add('hidden');
            createTeamInputs();
        }
    </script>
</body>
</html>
