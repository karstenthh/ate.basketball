<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(255,255,255,0.1);
        }

        .team-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .team-name-input {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            width: 140px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            font-weight: 600;
        }

        .score-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-plus { background: #10b981; color: white; }
        .btn-minus { background: #ef4444; color: white; }
        .btn-plus:hover { background: #059669; transform: translateY(-2px); }
        .btn-minus:hover { background: #dc2626; transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .team-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .team-color {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .team-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1f2937;
            min-height: 1.2em;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 900;
            margin: 20px 0;
            min-height: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .score-negative {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .team-score-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reset-btn {
            background: #6b7280;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.5rem; }
            .controls {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                padding: 15px;
            }
            .team-name-input { width: 120px; font-size: 14px; }
            .btn { padding: 10px 12px; font-size: 14px; min-width: 45px; }
            .teams-grid { 
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 20px 15px;
            }
            .team-card { padding: 25px 15px; }
            .score-display { font-size: 3rem; }
            .team-name { font-size: 1.4rem; }
        }

        @media (max-width: 480px) {
            .score-display { font-size: 2.5rem; }
            .team-name { font-size: 1.2rem; }
            .btn { padding: 8px 10px; font-size: 13px; min-width: 40px; }
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .score-pop {
            animation: scorePop 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Scoreboard</h1>
            <p>Live Score Tracker</p>
        </div>

        <div class="controls">
            <div class="team-controls">
                <input type="text" class="team-name-input" id="team1Name" placeholder="Team 1" maxlength="15" value="Team A">
                <div class="score-buttons">
                    <button class="btn btn-plus" onclick="changeScore(1, 1)">+1</button>
                    <button class="btn btn-plus" onclick="changeScore(1, 3)">+3</button>
                    <button class="btn btn-minus" onclick="changeScore(1, -1)">-1</button>
                </div>
            </div>

            <div class="team-controls">
                <input type="text" class="team-name-input" id="team2Name" placeholder="Team 2" maxlength="15" value="Team B">
                <div class="score-buttons">
                    <button class="btn btn-plus" onclick="changeScore(2, 1)">+1</button>
                    <button class="btn btn-plus" onclick="changeScore(2, 3)">+3</button>
                    <button class="btn btn-minus" onclick="changeScore(2, -1)">-1</button>
                </div>
            </div>

            <button class="reset-btn" onclick="resetScores()">🔄 Reset</button>
        </div>

        <div class="teams-grid">
            <div class="team-card">
                <div class="team-color" style="background: linear-gradient(90deg, #10b981, #059669);"></div>
                <div class="team-name" id="team1DisplayName">Team A</div>
                <div class="score-display" id="team1Score">0</div>
                <div class="team-score-controls">
                    <button class="btn btn-plus" onclick="changeScore(1, 10)">+10</button>
                    <button class="btn btn-minus" onclick="changeScore(1, -10)">-10</button>
                </div>
            </div>

            <div class="team-card">
                <div class="team-color" style="background: linear-gradient(90deg, #3b82f6, #1d4ed8);"></div>
                <div class="team-name" id="team2DisplayName">Team B</div>
                <div class="score-display" id="team2Score">0</div>
                <div class="team-score-controls">
                    <button class="btn btn-plus" onclick="changeScore(2, 10)">+10</button>
                    <button class="btn btn-minus" onclick="changeScore(2, -10)">-10</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scores = { team1: 0, team2: 0 };

        function updateDisplay() {
            document.getElementById('team1Score').textContent = scores.team1;
            document.getElementById('team2Score').textContent = scores.team2;
            
            const team1ScoreEl = document.getElementById('team1Score');
            const team2ScoreEl = document.getElementById('team2Score');
            
            team1ScoreEl.classList.remove('score-negative', 'score-pop');
            team2ScoreEl.classList.remove('score-negative', 'score-pop');
            
            if (scores.team1 < 0) team1ScoreEl.classList.add('score-negative');
            if (scores.team2 < 0) team2ScoreEl.classList.add('score-negative');
            
            team1ScoreEl.classList.add('score-pop');
            team2ScoreEl.classList.add('score-pop');
        }

        function changeScore(team, points) {
            if (team === 1) {
                scores.team1 += points;
            } else {
                scores.team2 += points;
            }
            updateDisplay();
        }

        function resetScores() {
            scores = { team1: 0, team2: 0 };
            updateDisplay();
        }

        document.getElementById('team1Name').addEventListener('input', function() {
            document.getElementById('team1DisplayName').textContent = this.value || 'Team A';
        });

        document.getElementById('team2Name').addEventListener('input', function() {
            document.getElementById('team2DisplayName').textContent = this.value || 'Team B';
        });

        updateDisplay();
    </script>
</body>
</html>
