<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard App</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #6366f1;
  --accent2: #22c55e;
  --danger: #ef4444;
  --text: #f1f5f9;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* PAGES */
.page {
  display: none;
  height: 100vh;
  padding: 20px;
}

.active {
  display: block;
}

/* LANDING */
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  border: none;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 16px;
  background: var(--accent);
  color: white;
  margin: 5px;
}

/* TEAM INPUT */
input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  width: 200px;
}

/* SCOREBOARD */
.scoreboard {
  display: flex;
  height: 80vh;
}

.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 10px;
}

.team-name {
  text-align: center;
  font-size: 2rem;
}

.score {
  font-size: 18vw;
  text-align: center;
}

.controls {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.controls button {
  font-size: 20px;
  margin: 5px;
}

.timer {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 10px;
}

/* leaderboard */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #334155;
  padding: 10px;
  text-align: center;
}

.gold {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="page active center">
  <h1>🏀 Scoreboard App</h1>
  <button onclick="goTo('setup')">Start Tournament</button>
</div>

<!-- SETUP -->
<div id="setup" class="page center">
  <h2>Enter Teams</h2>
  <div id="teamInputs"></div>
  <button onclick="addTeamInput()">+ Add Team</button>
  <button onclick="startTournament()">Start</button>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard" class="page">

  <div class="timer" id="timer">10:00</div>

  <div class="scoreboard">
    <div class="team">
      <div class="team-name" id="team1Name"></div>
      <div class="score" id="team1Score">0</div>
      <div class="controls">
        <button onclick="addScore(1,1)">+1</button>
        <button onclick="addScore(1,2)">+2</button>
        <button onclick="addScore(1,3)">+3</button>
        <button onclick="undoScore(1)">Undo</button>
      </div>
    </div>

    <div class="team">
      <div class="team-name" id="team2Name"></div>
      <div class="score" id="team2Score">0</div>
      <div class="controls">
        <button onclick="addScore(2,1)">+1</button>
        <button onclick="addScore(2,2)">+2</button>
        <button onclick="addScore(2,3)">+3</button>
        <button onclick="undoScore(2)">Undo</button>
      </div>
    </div>
  </div>

  <div style="text-align:center;">
    <button onclick="startTimer()">Start Timer</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="endMatch()">End Match</button>
    <button onclick="showLeaderboard()">Leaderboard</button>
  </div>

</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="page">
  <h2>Leaderboard</h2>
  <table id="leaderboardTable"></table>
  <button onclick="goTo('scoreboard')">Back</button>
</div>

<script>
let teams = [];
let matches = [];
let currentMatch = 0;

let scores = {team1:0, team2:0};
let history = {team1:[], team2:[]};

/* NAVIGATION */
function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* SETUP */
function addTeamInput(){
  let input = document.createElement("input");
  input.placeholder = "Team name";
  document.getElementById("teamInputs").appendChild(input);
}

addTeamInput();
addTeamInput();

function startTournament(){
  let inputs = document.querySelectorAll("#teamInputs input");
  teams = Array.from(inputs).map(i=>({
    name: i.value || "Team",
    wins: 0,
    points: 0
  }));

  generateMatches();
  loadMatch();
  goTo('scoreboard');
}

/* ROUND ROBIN */
function generateMatches(){
  matches = [];
  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      matches.push([i,j]);
    }
  }
}

/* MATCH */
function loadMatch(){
  let [a,b]=matches[currentMatch];
  document.getElementById("team1Name").innerText=teams[a].name;
  document.getElementById("team2Name").innerText=teams[b].name;
  scores={team1:0,team2:0};
  history={team1:[],team2:[]};
  updateUI();
}

/* SCORE */
function addScore(t,v){
  scores["team"+t]+=v;
  history["team"+t].push(v);
  updateUI();
}

function undoScore(t){
  let last=history["team"+t].pop();
  if(last) scores["team"+t]-=last;
  updateUI();
}

function updateUI(){
  team1Score.innerText=scores.team1;
  team2Score.innerText=scores.team2;
}

/* TIMER */
let time=600;
let interval;

function updateTimer(){
  let m=Math.floor(time/60);
  let s=time%60;
  timer.innerText=`${m}:${s.toString().padStart(2,'0')}`;
}

function startTimer(){
  interval=setInterval(()=>{
    if(time>0){time--;updateTimer();}
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
}

/* END MATCH */
function endMatch(){
  let [a,b]=matches[currentMatch];

  teams[a].points+=scores.team1;
  teams[b].points+=scores.team2;

  if(scores.team1>scores.team2) teams[a].wins++;
  else if(scores.team2>scores.team1) teams[b].wins++;

  currentMatch++;
  if(currentMatch>=matches.length){
    alert("Tournament Finished");
  } else {
    loadMatch();
  }
}

/* LEADERBOARD */
function showLeaderboard(){
  let sorted=[...teams].sort((a,b)=>{
    if(b.wins!==a.wins) return b.wins-a.wins;
    return b.points-a.points;
  });

  let html="<tr><th>Team</th><th>Wins</th><th>Points</th></tr>";
  sorted.forEach((t,i)=>{
    html+=`<tr class="${i===0?'gold':''}">
      <td>${t.name}</td>
      <td>${t.wins}</td>
      <td>${t.points}</td>
    </tr>`;
  });

  leaderboardTable.innerHTML=html;
  goTo('leaderboard');
}
</script>

</body>
</html>
