<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Tournament</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial;
    background: black;
    color: white;
    padding: 15px;
}

.container { max-width:1200px; margin:auto; }

.section {
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.hidden { display:none; }

.match-container {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#111;
    border-radius:15px;
}

.scoreboard { text-align:center; }
.score { font-size:3em; font-weight:bold; }
.timer { font-size:2em; color:gold; }

.controls {
    display:flex;
    gap:15px;
    margin-top:20px;
}

.team-controls {
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button {
    padding:14px;
    font-size:1.2em;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff6b6b,#ffd93d);
    color:white;
}

.undo { background:#777; }

/* MOBILE */
@media(max-width:768px){
    .controls { flex-direction:column; }
    button { width:100%; font-size:1.3em; }
    .match-container { flex-direction:column; gap:10px; }
}
</style>
</head>

<body>
<div class="container">

<!-- TEAM SETUP -->
<div id="teamSetup" class="section">
    <h2>Teams</h2>
    <div id="teamInputs"></div>
    <button onclick="generateSchedule()">Start Tournament</button>
</div>

<!-- SCHEDULE -->
<div id="scheduleSection" class="section hidden">
    <h2>Schedule</h2>
    <div id="scheduleList"></div>
    <button onclick="startNextMatch()">Start Next Match</button>
</div>

<!-- MATCH -->
<div id="matchSection" class="section hidden">
    <div class="match-container">
        <div class="scoreboard">
            <div id="team1Name"></div>
            <div id="team1Score" class="score">0</div>
        </div>

        <div id="timer" class="timer">12:00</div>

        <div class="scoreboard">
            <div id="team2Name"></div>
            <div id="team2Score" class="score">0</div>
        </div>
    </div>

    <div class="controls">
        <!-- TEAM 1 -->
        <div class="team-controls">
            <h3>Team 1</h3>
            <button onclick="addPoint(1,1)">+1</button>
            <button onclick="addPoint(1,2)">+2</button>
            <button onclick="addPoint(1,3)">+3</button>
            <button class="undo" onclick="undo(1)">UNDO</button>
        </div>

        <!-- TEAM 2 -->
        <div class="team-controls">
            <h3>Team 2</h3>
            <button onclick="addPoint(2,1)">+1</button>
            <button onclick="addPoint(2,2)">+2</button>
            <button onclick="addPoint(2,3)">+3</button>
            <button class="undo" onclick="undo(2)">UNDO</button>
        </div>
    </div>

    <button onclick="endMatch()">End Match</button>
</div>

<!-- STANDINGS -->
<div id="standingsSection" class="section hidden">
    <h2>Standings</h2>
    <div id="standingsList"></div>
    <button onclick="resetTournament()">Reset</button>
</div>

</div>

<script>
let teams = [];
let schedule = [];
let currentMatchIndex = -1;
let currentMatch = null;

let scores = { team1:0, team2:0 };

let history = { team1:[], team2:[] };

// create inputs
function init(){
    let div = document.getElementById('teamInputs');
    for(let i=0;i<5;i++){
        div.innerHTML += `<input placeholder="Team ${i+1}" id="team${i}"><br>`;
    }
}
init();

function generateSchedule(){
    teams=[];
    for(let i=0;i<5;i++){
        let name=document.getElementById(`team${i}`).value;
        teams.push({name,wins:0});
    }

    schedule=[];
    for(let i=0;i<5;i++){
        for(let j=i+1;j<5;j++){
            schedule.push({team1:teams[i],team2:teams[j]});
        }
    }

    document.getElementById('teamSetup').classList.add('hidden');
    document.getElementById('scheduleSection').classList.remove('hidden');

    displaySchedule();
}

function displaySchedule(){
    let div=document.getElementById('scheduleList');
    div.innerHTML='';
    schedule.forEach((m,i)=>{
        div.innerHTML+=`<div>${i+1}. ${m.team1.name} vs ${m.team2.name}</div>`;
    });
}

function startNextMatch(){
    currentMatchIndex++;
    if(currentMatchIndex>=schedule.length) return;

    currentMatch=schedule[currentMatchIndex];

    scores={team1:0,team2:0};
    history={team1:[],team2:[]};

    document.getElementById('team1Name').textContent=currentMatch.team1.name;
    document.getElementById('team2Name').textContent=currentMatch.team2.name;

    document.getElementById('scheduleSection').classList.add('hidden');
    document.getElementById('matchSection').classList.remove('hidden');
}

function addPoint(team,pts){
    if(team===1){
        scores.team1+=pts;
        history.team1.push(pts);
        document.getElementById('team1Score').textContent=scores.team1;
    }else{
        scores.team2+=pts;
        history.team2.push(pts);
        document.getElementById('team2Score').textContent=scores.team2;
    }
}

function undo(team){
    if(team===1 && history.team1.length){
        scores.team1-=history.team1.pop();
        document.getElementById('team1Score').textContent=scores.team1;
    }
    if(team===2 && history.team2.length){
        scores.team2-=history.team2.pop();
        document.getElementById('team2Score').textContent=scores.team2;
    }
}

function endMatch(){
    if(scores.team1>scores.team2){
        currentMatch.team1.wins++;
    }else if(scores.team2>scores.team1){
        currentMatch.team2.wins++;
    }

    document.getElementById('matchSection').classList.add('hidden');
    document.getElementById('scheduleSection').classList.remove('hidden');

    if(currentMatchIndex===schedule.length-1){
        showStandings();
    }
}

function showStandings(){
    document.getElementById('standingsSection').classList.remove('hidden');

    let sorted=[...teams].sort((a,b)=>b.wins-a.wins);

    let div=document.getElementById('standingsList');
    div.innerHTML='';

    sorted.forEach((t,i)=>{
        div.innerHTML+=`<div>${i+1}. ${t.name} (${t.wins}W)</div>`;
    });
}

function resetTournament(){
    location.reload();
}
</script>

</body>
</html>
